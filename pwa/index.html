<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MavisExpense — Expense Copilot</title>
  <meta name="description" content="Zero-friction expense logging with Google Sheets sync">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16132a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="icons/favicon.png" sizes="32x32" type="image/png">
  <link rel="icon" href="icons/icon-192x192.png" type="image/png" sizes="192x192">
  <link rel="icon" href="icons/icon-512x512.png" type="image/png" sizes="512x512">
  <link rel="apple-touch-icon" href="icons/icon-180x180.png">

  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    href="/splash/splash-1290x2796.png">
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"

  <!-- iPhone 16 Pro / 15 -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
    href="/splash/splash-1179x2556.png">
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
    href="/splash/splash-2556x1179.png">

  <!-- iPhone SE / 8 -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    href="/splash/splash-750x1334.png">
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
    href="/splash/splash-1334x750.png">

  <!-- iPad Pro 13" -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    href="/splash/splash-2048x2732.png">
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
    href="/splash/splash-2732x2048.png">

  <!-- iPad Pro 11" -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    href="/splash/splash-1668x2388.png">
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
    href="/splash/splash-2388x1668.png">

  <!-- iPad Air -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    href="/splash/splash-1640x2360.png">
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
    href="/splash/splash-2360x1640.png">

  <!-- iPad Mini -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
    href="/splash/splash-1536x2048.png">
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
    href="/splash/splash-2048x1536.png">



  <script src="lucide.js"></script>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      var errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.top = '0';
      errDiv.style.left = '0';
      errDiv.style.width = '100%';
      errDiv.style.background = '#ef4444';
      errDiv.style.color = '#ffffff';
      errDiv.style.padding = '10px';
      errDiv.style.zIndex = '999999';
      errDiv.style.fontSize = '12px';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.wordBreak = 'break-all';
      errDiv.innerHTML = '<strong>App Error:</strong> ' + msg + ' at ' + url + ':' + line + ':' + col;
      document.body.appendChild(errDiv);
      return false;
    };
    window.onunhandledrejection = function (event) {
      var errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.top = '0';
      errDiv.style.left = '0';
      errDiv.style.width = '100%';
      errDiv.style.background = '#f59e0b';
      errDiv.style.color = '#ffffff';
      errDiv.style.padding = '10px';
      errDiv.style.zIndex = '999999';
      errDiv.style.fontSize = '12px';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.wordBreak = 'break-all';
      errDiv.innerHTML = '<strong>Unhandled Rejection:</strong> ' + event.reason;
      document.body.appendChild(errDiv);
    };
  </script>
</head>

<body>

  <div class="app-container">



    <!-- ACTIVE VISIT BAR -->
    <section id="visit-bar">

      <select id="visit-select-past" class="switch-btn"
        style="display:none; text-align: center; width: calc(45% - 0.2rem); flex: 0 0 calc(45% - 0.2rem);"
        onchange="app.selectPastVisit(this.value)" placeholder="OLD VISITS">
      </select>



    </section>

    <!-- ═══════════════════════════════════════════════════════
         TAB 1 — SYNC & LOGS
    ════════════════════════════════════════════════════════ -->
    <main id="tab-sync" class="tab-content" role="main" aria-label="Sync and logs">



      <!-- HISTORY HEADER + VIEW SWITCHER -->


      <!-- View Switcher -->
      <div class="header-switch" id="history-switcher" role="group" aria-label="View mode">


        <div id="filter-expenses" class="switch-btn-rnd" onclick="app._toggleFilter()">
          <svg data-lucide="filter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
          </svg>
        </div>
        <button class="switch-btn active" id="pwa-view-btn-list">
          <svg data-lucide="list" width="15" height="15"></svg>
          <span id="history-title-text" class="text" style="display:flex;">Visit List</span>
        </button>

        <button class="switch-btn" id="pwa-view-btn-cal" aria-pressed="false" title="Calendar view">
          <svg data-lucide="calendar-days" width="15" height="15"></svg>
          <span id="calender-title-text" class="text" style="display:flex;">Calendar</span>
        </button>

        <button class="switch-btn" id="pwa-view-btn-loc" role="tab" aria-selected="false" aria-controls="pwa-view-loc">
          <svg data-lucide="map-pin" width="15" height="15"></svg>
          <span id="loc-title-text" class="text" style="display:none;">Location</span>
        </button>


      </div>



      <!-- LIST VIEW -->
      <div id="pwa-view-list" style="display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden;">
        <!-- Filter Bar -->
        <div class="pwa-list-filter-bar" id="filter-bar">
          <div class="filter-select-case grow">
            <svg class="filter-icon" data-lucide="calendar-range" width="14" height="14"></svg>
            <select id="pwa-filter-year" class="pwa-filter-select open"
              style="border-right: 1px solid var(--border-glow);">
              <option value="all">All Yrs</option>
            </select>
            <select id="pwa-filter-month" class="pwa-filter-select open">
              <option value="all">All Mos</option>
            </select>
          </div>
          <div class="filter-select-case">
            <svg class="filter-icon" data-lucide="list-checks" width="14" height="14"></svg>
            <select id="pwa-filter-status" class="pwa-filter-select">
              <option value="all">All</option>
              <option value="pending">Pending</option>
              <option value="synced">Synced</option>
            </select>
          </div>

          <div class="filter-select-case">
            <svg class="filter-icon" data-lucide="map-pin" width="14" height="14"></svg>
            <select id="pwa-filter-location" class="pwa-filter-select">
              <option value="all">All Locations</option>
            </select>
          </div>


          <div id="btn-archive-view" class="filter-select-case" title="View Archive" aria-label="View Archive">
            <svg class="filter-icon" data-lucide="archive" width="14" height="14"></svg>
            <div id="archive-view-text" class="pwa-filter-select">Archived Items</div>
          </div>

        </div>

        <!-- SYNC PENDING BUTTON -->
        <div id="syncHead" class="sync-area" style="display: none; position: relative;">
          <button id="btn-sync-now" class="btn btn-primary" onclick="app.syncPendingLogs()"
            style="width:100%; margin-bottom:0.5rem;" disabled>
            Sync with Google Sheets
          </button>
          <strong id="unsynced-count" class="nav-badge">0</strong>
          <div id="sync-error-msg" class="sync-error" style="display:none;"></div>
        </div>
        <!-- List Items -->
        <div id="history-list" class="log-list">
          <div class="empty-state">Loading visits and expenses...</div>
        </div>
      </div>

      <!-- CALENDAR VIEW -->
      <div id="pwa-view-calendar" class="pwa-calendar-container" style="display:none; gap:25px;">
        <!-- Calendar Header -->
        <div class="pwa-calender-head">
          <div class="pwa-cal-year-nav">
            <span class="pwa-cal-btn" id="pwa-cal-year-next" aria-label="Next year">
              <svg data-lucide="chevron-up" width="14" height="14"></svg>
            </span>
            <span class="pwa-cal-year-label" id="pwa-cal-year-label">2026</span>
            <span class="pwa-cal-btn" id="pwa-cal-year-prev" aria-label="Previous year">
              <svg data-lucide="chevron-down" width="14" height="14"></svg>
            </span>
          </div>
          <div style="display:flex; flex-direction:column; width:100%; height:100%;">
            <div class="pwa-cal-month-grid" id="pwa-cal-month-nav"></div>
            <div class="pwa-cal-month-summary" style="display: none;">
              <div class="pwa-stat">
                <svg data-lucide="calendar" width="10" height="10" style="color:var(--secondary)"></svg>
                <span id="pwa-sum-days">0</span>d
                <span id="pwa-sum-visits">0</span>v
                <span id="pwa-sum-mileage">0</span>mi
                <span id="pwa-sum-exp-count">0</span>ex
              </div>
              <div class="pwa-stat">
                <svg data-lucide="clock" width="10" height="10" style="color:var(--warning)"></svg>
                <span id="pwa-sum-pending">0</span>⏳
              </div>
            </div>
          </div>
        </div>
        <!-- Day Grid -->
        <div class="pwa-cal-grid" id="pwa-cal-grid"></div>
      </div>

      <!-- ── Panel 2: Locations ─────────────────────────────── -->
      <section id="pwa-view-loc" class="settings-panel" role="tabpanel" aria-labelledby="set-tab-locations">

        <!-- Zone 1: Pinned Office Card (JS-rendered) -->
        <div id="loc-office-slot"></div>

        <!-- Scrollable container holding both the list of locations and the Add card -->
        <div class="locations-scroll" id="locations-scroll-container">
          <div id="locations-list" style="display: flex; flex-direction: column; gap: 0.45rem;">
            <div class="empty-state">No locations yet.</div>
          </div>

          <!-- Zone 2: Pinned collapsible Add Location card (now at the bottom of the list) -->
          <div class="location-card add" id="loc-add-card">
            <div class="loc-add-header" onclick="app.toggleAddLocation()">
              <svg data-lucide="map-pin-plus" width="15" height="15" style="color:currentColor; flex-shrink:0;"></svg>
              <span>Add New Location</span>
              <svg data-lucide="chevron-down" class="loc-chevron" width="14" height="14"
                style="margin-left:auto; flex-shrink:0;"></svg>
            </div>
            <div class="loc-add-body" id="loc-add-body">
              <div class="btn-row" style="gap:0.5rem; margin-bottom:0.4rem;">
                <input type="text" id="loc-name" class="form-control" placeholder="Location name…" style="flex:1;">
              </div>
              <div class="btn-row" style="gap:0.5rem; margin-bottom:0.4rem;">
                <input type="number" id="loc-lat" class="form-control" placeholder="Latitude" step="0.00001"
                  style="flex:1;">
                <input type="number" id="loc-lng" class="form-control" placeholder="Longitude" step="0.00001"
                  style="flex:1;">

                <button class="btn btn-outline" title="Use GPS" onclick="app.getDeviceGPS()"
                  style="flex-shrink:0; padding:0 0.6rem;">
                  <svg data-lucide="locate" width="15" height="15"></svg>
                </button>
              </div>

              <div class="btn-row" style="gap:0.5rem; margin-bottom:0.4rem;">
                <input type="number" id="loc-radius" class="form-control" style="display:none;" placeholder="Radius (m)"
                  step="10" min="50" value="100" style="flex:1;">
                <select id="loc-category" class="form-control" style="flex:1;">
                  <option value="visit">Visit</option>
                  <option value="office">Office</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <button class="btn btn-primary" style="width:100%;" onclick="app.addLocationFromForm()">
                Save Location
              </button>
            </div>
          </div>
        </div>

      </section>

    </main>

    <!-- DAY POPUP OVERLAY (bottom sheet) -->
    <div id="pwa-day-popup-overlay" class="pwa-day-popup-overlay" role="dialog" aria-modal="true"
      aria-label="Day detail">
      <div class="pwa-day-popup" id="pwa-day-popup">
        <div class="pwa-popup-handle"></div>
        <div class="pwa-popup-date-title" id="pwa-popup-date-title">Day Detail</div>
        <div id="pwa-popup-items-container"></div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         TAB 2 — RECORD PAGE (EXPENSE FORM)
    ════════════════════════════════════════════════════════ -->
    <main id="tab-record" class="tab-content active" role="main" aria-label="Record expense"
      style="scrollbar-width: none; gap:5px">



      <!-- ─── EXPENSE CARD CAROUSEL ────────────────────────── -->

      <div id="card-carousel-wrapper">

        <!-- Swipe hint dots -->
        <div id="group-dots"></div>

        <!-- scrollable track — cards injected here by JS -->
        <div id="card-track">

          <!-- CARD 0 — New Expense (always present, injected on init) -->
          <div class="expense-card" data-card-index="0">
            <div class="card-inner" id="card-inner-0">

              <!-- FRONT: camera capture + receipt preview -->
              <div class="card-face card-front" id="frame">

                <label class="receipt-capture-btn" for="exp-receipt" id="receipt-label" style="position:relative;">
                  <label class="ai-toggle">
                    <input type="checkbox" id="ai-mode-toggle" onchange="app.toggleAiMode(this.checked)" checked>
                    <span class="ai-slider"> </span>
                    <span class="ai-toggle-label">AI</span>
                  </label>
                  <svg width="82" height="82" stroke="currentColor" stroke-width="1" data-lucide="camera"></svg>
                </label>

                <div id="receipt-preview-wrap"
                  style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; z-index:1;">
                  <img id="receipt-preview" style="width:100%; height:100%; object-fit:cover; border-radius:inherit;">

                  <div id="ai-shimmer-overlay" class="shimmer-overlay" style="display:none;">
                    <div class="shimmer"></div>
                    <div class="shimmer-text">AI is extracting data...</div>
                  </div>

                  <button type="button" class="receipt-remove-btn" onclick="app.removeReceipt()"
                    title="Remove photo">✕</button>
                </div>

                <input type="file" id="exp-receipt" accept="image/*" capture="environment" style="display:none;">

                <svg id="detail-toggle" class="detail-toggle" onclick="app.expenseMode()" width="50" height="50"
                  stroke="currentColor" stroke-width="2" data-lucide="form"></svg>

              </div><!-- /.card-front -->

              <!-- BACK: expense details form -->
              <div class="card-face card-edit">

                <!-- ─── EXPENSE DETAILS FORM ─────────────────────── -->
                <form id="expense-form-details" onsubmit="app.saveExpense(event)" class="expense-form-details">
                  <div style="padding-left: 10px;">
                    <div class="card-title" style="flex-grow: 0;font-size: 1rem; padding:0; opacity: 0.5; color:black">

                    </div>
                    <div id="expense-form-title" class="card-title"
                      style="flex-grow: 0; font-size: 2rem;padding-top: 0; opacity: 0.8; color:black">
                      Receipt
                    </div>
                  </div>

                  <input type="number" id="exp-amount" class="form-control" step="0.01" min="0"
                    placeholder="Receipt Amount: £0.00">

                  <select id="exp-category" class="form-control" placeholder="category" required>
                    <option value="Snacks"> Snacks</option>
                    <option value="Fuel"> Fuel</option>
                    <option value="Hotel"> Hotel / Accommodation</option>
                    <option value="Tolls"> Tolls / Parking</option>
                    <option value="Other"> Other</option>
                  </select>

                  <input type="text" id="exp-vendor" class="form-control" placeholder="Vendor e.g. KFC">

                  <textarea id="exp-notes" class="form-control" rows="2" placeholder="Brief Note"></textarea>

                  <select id="log-select-visit" class="form-control linked-visit-row"
                    onchange="app.onLinkedVisitChange()">
                    <option value="">-- Select a visit --</option>
                  </select>

                </form>
                <div class="photo-toggle" onclick="app.expenseMode()">
                  <svg id="detail-toggle" class="camera" width="50" height="50" stroke="currentColor" stroke-width="2"
                    data-lucide="camera"></svg>

                  <div class="aiText">
                    <strong>AI</strong>
                    <p>Assisted</p>
                  </div>
                </div>
              </div><!-- /.card-back -->

            </div><!-- /.card-inner -->
          </div><!-- /.expense-card[0] -->

        </div><!-- /#card-track -->


      </div><!-- /#card-carousel-wrapper -->
    </main>

    <!-- ═══════════════════════════════════════════════════════
         TAB 3 — SETTINGS
    ════════════════════════════════════════════════════════ -->
    <main id="tab-settings" class="tab-content" role="main" aria-label="Settings">

      <!-- Settings Tab Switcher -->
      <div class="header-switch" role="tablist" aria-label="Settings sections">
        <button class="settings-tab-btn active" id="set-tab-link" role="tab" aria-selected="true"
          aria-controls="set-panel-link" onclick="app.switchSettingsTab('link')">
          <svg data-lucide="link" width="15" height="15"></svg>
          Google Link
        </button>



        <div id="btn-theme-toggle" class="switch-btn-rnd" title="Toggle theme" aria-label="Toggle light/dark theme">
          <svg id="icon-moon" data-lucide="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
          </svg>
          <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" data-lucide="sun" stroke-linejoin="round" style="display:none;">
          </svg>
        </div>

      </div>

      <!-- ── Panel 1: Google Data Link ──────────────────────── -->
      <section class="settings-panel active" id="set-panel-link" role="tabpanel" aria-labelledby="set-tab-link"
        style="flex-grow:1;">
        <div class="glass-card">
          <h2 class="card-title">

            Google Data Link

          </h2>
          <div class="form-group">

            <input type="url" id="set-webapp-url" class="form-control"
              placeholder="Apps Script WebApp URL | https://script.google.com/macros/s/.../exec">
          </div>
          <div class="form-group">
            <input type="password" id="set-secret-key" class="form-control" placeholder="Your shared secret token">
          </div>
          <div class="btn-row">
            <button class="btn btn-secondary style=" flex:1;" onclick="app.saveSettings()">Save Settings</button>
            <button class="btn btn-outline" onclick="app.testConnection()" style="flex:1;">Test Connection</button>
          </div>
          <div id="sync-error-msg-settings" class="sync-error" style="display:none; margin-top:0.75rem;"></div>
        </div>





        <div class="glass-card" style="flex-grow:1;">

          <h2 class="card-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" data-lucide="terminal" stroke-linejoin="round" style="stroke:var(--primary)">
            </svg>
            Console Log
            <button class="btn btn-outline" onclick="app.clearDevConsole()"
              style="margin-left:auto; font-size:0.7rem; padding:0.25rem 0.5rem;">Clear</button>

          </h2>


          <div class="console-box" id="dev-console">
            &gt; Console ready.


          </div>
        </div>



      </section>



      <!-- ── Panel 3: Developer Console ─────────────────────── -->
      <section class="settings-panel" id="set-panel-dev" role="tabpanel" aria-labelledby="set-tab-dev"
        style="flex:1; display:none;">

      </section>

    </main>

    <section id="welcome" class="welcome">
      <div class="welcome-content">
        <div class="welcome-icon-wrap">
          <img src="icons/icon-192x192.png" alt="Mittens" class="welcome-icon" width="96" height="96">
          <div class="loading-spinner"></div>
        </div>
        <p class="welcome-subtitle">Mittens</p>

      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════
         BOTTOM NAVIGATION  (3 items)
    ════════════════════════════════════════════════════════ -->
    <nav id="dynamic-bottom-nav" class="bottom-nav" role="navigation" aria-label="Main navigation"
      data-nav-state="AUTO">

      <button id="left-nav-btn" class="nav-item" onclick="app.handleNavLeft()" aria-label="Navigation Left Action">
        <svg id="left-nav-icon" data-lucide="calendar" width="24" height="24" stroke="currentColor"
          stroke-width="2"></svg>
        <span id="nav-sync-badge" class="nav-badge" style="display:flex;">0</span>
      </button>

      <button id="main-nav-btn" class="nav-item nav-fab" onclick="app.handleNavMain()"
        aria-label="Navigation Main Action">
        <div class="fab-circle" id="fab-circle">
          <svg id="main-nav-icon" data-lucide="LoaderCircle" width="26" height="26" stroke="currentColor"
            stroke-width="2"></svg>
        </div>
      </button>

      <button id="right-nav-btn" class="nav-item rotate" onclick="app.handleNavRight()"
        aria-label="Navigation Right Action">
        <svg id="right-nav-icon" data-lucide="settings" width="24" height="24" stroke="currentColor"
          stroke-width="2"></svg>
      </button>

    </nav>


  </div><!-- /.app-container -->

  <!-- ATTACHMENT MODAL -->
  <div id="attachment-modal" class="attachment-modal" style="display:none;" role="dialog" aria-modal="true">
    <div class="attachment-modal-content">
      <button class="attachment-modal-close" onclick="app.closeAttachmentModal()"><svg data-lucide="x" width="24"
          height="24"></svg></button>
      <img id="attachment-modal-img" src="" alt="Receipt Attachment">
    </div>
